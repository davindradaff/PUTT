<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1;"/>
      <stop offset="100%" style="stop-color:#FCE4EC;stop-opacity:1;"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bodyGrad)"/>
  
  <!-- Decorative -->
  <circle cx="80" cy="80" r="50" fill="#FF9800" opacity="0.08"/>
  <circle cx="320" cy="220" r="60" fill="#E91E63" opacity="0.1"/>
  
  <!-- Body care illustration -->
  <g transform="translate(200, 135)">
    <!-- Full body outline -->
    <path d="M 0 -40 Q -15 -25 -15 0 Q -15 20 -5 35 L 5 35 Q 15 20 15 0 Q 15 -25 0 -40 Z" fill="#FDBCB4" stroke="#FF9800" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="0" cy="-45" r="10" fill="#FDBCB4" stroke="#FF9800" stroke-width="1.5"/>
    
    <!-- Hydration/glow lines -->
    <path d="M -18 -20 Q -25 -10 -20 5" stroke="#FF9800" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 18 -20 Q 25 -10 20 5" stroke="#FF9800" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M -10 15 L -12 25" stroke="#E91E63" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 10 15 L 12 25" stroke="#E91E63" stroke-width="1.5" fill="none" opacity="0.4"/>
    
    <!-- Moisture effect -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF9800" text-anchor="middle">
    Perawatan Tubuh
  </text>
</svg>