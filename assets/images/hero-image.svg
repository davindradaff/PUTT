<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="500" r="120" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Woman face illustration -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="250" r="100" fill="#FDBCB4"/>
    
    <!-- Hair -->
    <path d="M 300 250 Q 300 150 400 150 Q 500 150 500 250" fill="#8B4513" opacity="0.8"/>
    <path d="M 320 180 Q 340 160 400 160 Q 460 160 480 180" fill="#6B3410"/>
    
    <!-- Eyes -->
    <circle cx="360" cy="240" r="8" fill="#333"/>
    <circle cx="440" cy="240" r="8" fill="#333"/>
    <circle cx="362" cy="238" r="3" fill="#fff"/>
    <circle cx="442" cy="238" r="3" fill="#fff"/>
    
    <!-- Eyebrows -->
    <path d="M 345 220 Q 360 215 375 220" stroke="#333" stroke-width="3" fill="none"/>
    <path d="M 425 220 Q 440 215 455 220" stroke="#333" stroke-width="3" fill="none"/>
    
    <!-- Nose -->
    <path d="M 400 240 L 400 310" stroke="#D4A574" stroke-width="2" fill="none"/>
    
    <!-- Mouth -->
    <path d="M 380 340 Q 400 355 420 340" stroke="#E84B8A" stroke-width="3" fill="none"/>
    
    <!-- Blush -->
    <ellipse cx="320" cy="280" rx="25" ry="20" fill="#FF9CD9" opacity="0.4"/>
    <ellipse cx="480" cy="280" rx="25" ry="20" fill="#FF9CD9" opacity="0.4"/>
  </g>
  
  <!-- Beauty elements -->
  <g>
    <text x="400" y="520" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">
      GRIYA CANTIK POETRI
    </text>
    <text x="400" y="560" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" opacity="0.9">
      Klinik Kecantikan Profesional
    </text>
  </g>
  
  <!-- Sparkles -->
  <circle cx="250" cy="150" r="4" fill="#fff"/>
  <circle cx="550" cy="200" r="3" fill="#fff"/>
  <circle cx="300" cy="450" r="3" fill="#fff"/>
  <circle cx="650" cy="350" r="4" fill="#fff"/>
</svg>