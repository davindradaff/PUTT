<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="treatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1;"/>
      <stop offset="100%" style="stop-color:#FCE4EC;stop-opacity:1;"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#treatGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="70" cy="70" r="45" fill="#9C27B0" opacity="0.1"/>
  <circle cx="330" cy="230" r="55" fill="#E91E63" opacity="0.08"/>
  
  <!-- Spa treatment illustration -->
  <g transform="translate(200, 140)">
    <!-- Body outline -->
    <ellipse cx="0" cy="10" rx="25" ry="40" fill="#FDBCB4" stroke="#9C27B0" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="0" cy="-35" r="15" fill="#FDBCB4" stroke="#9C27B0" stroke-width="1.5"/>
    
    <!-- Treatment elements - massage lines -->
    <path d="M -20 0 Q -10 10 0 15 Q 10 10 20 0" stroke="#E91E63" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M -20 20 Q -10 30 0 35 Q 10 30 20 20" stroke="#9C27B0" stroke-width="2" fill="none" opacity="0.6"/>
    
    <!-- Relaxation aura -->
    <circle cx="0" cy="10" r="45" fill="none" stroke="#E91E63" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    
    <!-- Sparkles -->
    <circle cx="-35" cy="-5" r="2" fill="#FFD700"/>
    <circle cx="35" cy="15" r="2" fill="#FFD700"/>
    <circle cx="-10" cy="-45" r="1.5" fill="#FFD700"/>
    <circle cx="15" cy="-45" r="1.5" fill="#FFD700"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9C27B0" text-anchor="middle">
    Treatment Premium
  </text>
</svg>